version: '3.8'

services:
  # 1. PostgreSQL - Core Relational Database (Users, Orders, Stores, Fin)
  postgres:
    image: postgres:15-alpine
    container_name: pqc_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: plumbing_commerce
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Redis - Geo-Spatial Tracking & Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: pqc_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  # 3. MongoDB - Chat & Service Logs
  mongodb:
    image: mongo:6-jammy
    container_name: pqc_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  # 4. Zookeeper (Required for Kafka Broker)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: pqc_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # 5. Apache Kafka - Event Driven Architecture Broker
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: pqc_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  pgdata:
  redisdata:
  mongodata:
