server:
  port: 8081

spring:
  application:
    name: plumbing-core
  
  # PostgreSQL Configuration (Main Relational DB)
  datasource:
    url: jdbc:postgresql://localhost:5433/plumbing_commerce
    username: admin
    password: rootpassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # NoSQL & Cache Configuration
  data:
    redis:
      host: localhost
      port: 6379
    mongodb:
      uri: mongodb://admin:rootpassword@localhost:27017/plumbing_commerce?authSource=admin

  # Kafka Event Bus
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: plumbing-core-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      
logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.data: DEBUG

security:
  jwt:
    secret: ${JWT_SECRET:PlumbCommerceJwtSecretKey-2024-CHANGE_IN_PRODUCTION!}
    expiration: 86400000 # 24 hours

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  tracing:
    sampling:
      probability: 1.0 # Trace 100% of requests in dev
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans # Default Zipkin endpoint
