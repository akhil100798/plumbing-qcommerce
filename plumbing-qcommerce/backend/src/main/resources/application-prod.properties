server.port=${PORT:8081}
server.address=0.0.0.0

spring.datasource.url=${DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/plumbing_commerce}}
spring.datasource.username=${DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:admin}}
spring.datasource.password=${DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:local-postgres-password}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
app.flyway.baseline-on-migrate=false

spring.data.redis.host=${REDIS_HOST:${SPRING_DATA_REDIS_HOST:localhost}}
spring.data.redis.port=${REDIS_PORT:${SPRING_DATA_REDIS_PORT:6379}}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

spring.data.mongodb.uri=${MONGO_URI:${SPRING_MONGODB_URI:mongodb://localhost:27017/plumbing_commerce}}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}}
spring.kafka.properties.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM:PLAIN}
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_USERNAME:}" password="${KAFKA_PASSWORD:}";

app.scheduling.enabled=${APP_SCHEDULING_ENABLED:true}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3100,http://localhost:3000}

security.jwt.secret=${JWT_SECRET}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
