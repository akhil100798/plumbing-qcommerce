server.port=${PORT:10000}
server.address=0.0.0.0

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
app.flyway.baseline-on-migrate=false

spring.data.redis.host=${REDIS_HOST:}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# MongoDB is optional in this deployment mode and must be configured through the environment.
spring.data.mongodb.uri=${MONGO_URI:}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Kafka - disabled in prod (use empty to skip)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:}

app.scheduling.enabled=${APP_SCHEDULING_ENABLED:false}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

security.jwt.secret=${JWT_SECRET}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# Disable distributed tracing in prod (no Zipkin server on Render free tier)
management.tracing.enabled=false
management.tracing.sampling.probability=0.0
# Disable MongoDB health check to prevent actuator timeouts when MongoDB is optional/disabled
management.health.mongo.enabled=false
management.health.mongodb.enabled=false

app.otp.length=${OTP_LENGTH:6}
app.otp.expiry-seconds=${OTP_EXPIRY_SECONDS:300}
app.otp.resend-cooldown-seconds=${OTP_RESEND_COOLDOWN_SECONDS:60}
app.otp.max-verify-attempts=${OTP_MAX_VERIFY_ATTEMPTS:5}
app.otp.demo-bypass-enabled=false
app.otp.demo-code=
app.otp.hash-secret=${OTP_HASH_SECRET}

app.sms.provider=${SMS_PROVIDER:none}
app.sms.local-capture-enabled=false
app.sms.fail-if-missing-provider=true

app.seed.demo-enabled=false
app.seed.catalog-enabled=false
app.seed.admin-demo-enabled=false
app.seed.fail-if-prod-demo-enabled=true
app.seed.demo-password=
