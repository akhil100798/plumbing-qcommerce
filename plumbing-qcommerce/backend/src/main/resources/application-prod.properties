server.port=${PORT:10000}
server.address=0.0.0.0

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
app.flyway.baseline-on-migrate=false

spring.data.redis.host=${REDIS_HOST:red-d90ap3j7uimc7397kdmg}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:EzScCYoa3TvBrvBjYb7Eb4LDyCclbibm}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# MongoDB - disabled when MONGO_URI is not provided
spring.data.mongodb.uri=${MONGO_URI:}
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Kafka - disabled in prod (use empty to skip)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:}

app.scheduling.enabled=${APP_SCHEDULING_ENABLED:false}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3100}

security.jwt.secret=${JWT_SECRET}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# Disable distributed tracing in prod (no Zipkin server on Render free tier)
management.tracing.enabled=false
management.tracing.sampling.probability=0.0
