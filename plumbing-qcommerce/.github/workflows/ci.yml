name: PlumbCommerce CI/CD Release Gates

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-gate:
    name: Backend CI (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run tests
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean test

  edge-gate:
    name: Edge Service CI (Node.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: edge-service/package-lock.json

      - name: Install dependencies
        run: |
          cd edge-service
          npm ci

      - name: Run tests
        run: |
          cd edge-service
          npm test

      - name: Check build correctness
        run: |
          cd edge-service
          npm run build

  admin-gate:
    name: Admin Portal CI (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-portal/package-lock.json

      - name: Install dependencies
        run: |
          cd admin-portal
          npm ci

      - name: Run typecheck
        run: |
          cd admin-portal
          npm run typecheck

      - name: Run tests
        run: |
          cd admin-portal
          npm test

      - name: Build production bundle
        run: |
          cd admin-portal
          npm run build

  mobile-gates:
    name: Mobile Apps CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app-directory: [ customer-app, plumber-app, store-app ]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.app-directory }}/package-lock.json

      - name: Install dependencies
        run: |
          cd ${{ matrix.app-directory }}
          npm ci

      - name: Run typecheck
        run: |
          cd ${{ matrix.app-directory }}
          npm run typecheck

      - name: Run tests
        run: |
          cd ${{ matrix.app-directory }}
          npm test

      - name: Export web bundle (Expo)
        run: |
          cd ${{ matrix.app-directory }}
          npm run build
