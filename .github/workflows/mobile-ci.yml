name: Mobile Web CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  mobile-web:
    name: ${{ matrix.app }} Typecheck, Tests, and Web Export
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: customer-app
            path: plumbing-qcommerce/customer-app
          - app: plumber-app
            path: plumbing-qcommerce/plumber-app
          - app: store-app
            path: plumbing-qcommerce/store-app
    env:
      EXPO_PUBLIC_BACKEND_URL: http://localhost:8081
      EXPO_PUBLIC_EDGE_URL: http://localhost:3000
      CI: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Typecheck
        working-directory: ${{ matrix.path }}
        run: npm run typecheck

      - name: Run tests
        working-directory: ${{ matrix.path }}
        run: npm test

      - name: Export web build
        working-directory: ${{ matrix.path }}
        run: npx expo export --platform web
